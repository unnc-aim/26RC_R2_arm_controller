arm_controller:
  ros__parameters:
    sbus:
      topic: "/sbus/read"
      mode_channel: 4
      estop_channel: 4
      estop_high: 1600
      estop_low: 370
      mode_high: 1600
      mode_mid: 1024
      mode_low: 360
      debounce_ms: 100

    joint1:
      read_topic: "/joint1/read"
      write_topic: "/joint1/write"

    joint2:
      read_topic: "/joint2/read"
      write_topic: "/joint2/write"

    joint3:
      read_topic: "/joint3/read"
      write_topic: "/joint3/write"

    joint4:
      read_topic: "/joint4/read"
      write_topic: "/joint4/write"

    motion:
      control_loop_hz: 1000.0
      speed: 0.4
      position_tolerance: 0.01
      pose_timeout_sec: 30.0
      sequence_step_timeout_sec: 60.0
      sequence_total_timeout_sec: 300.0

    joint_limits:
      joint1:
        min: 1.83
        max: -0.03
      joint2:
        min: -0.23
        max: 0.93
      joint3:
        min: -1.04
        max: 2.6
      joint4:
        min: -3.141592653589793
        max: 3.141592653589793

    handle_kfs:
      pick_down:
        step_count: 4
        steps:
          0:
            pose: pose5
            dwell_sec: 0.0
            suction_action: 1
            suction_when: after_reach
          1:
            pose: pose6
            dwell_sec: 0.0
            suction_action: 0
            suction_when: after_dwell
          2:
            pose: pose7
            dwell_sec: 0.0
            suction_action: 0
            suction_when: after_reach
          3:
            pose: pose4  
            dwell_sec: 0.5
            suction_action: 0
            suction_when: after_reach

      pick_up:
        step_count: 4
        steps:
          0:
            pose: pose1
            dwell_sec: 0.0
            suction_action: 1
            suction_when: after_reach
          1:
            pose: pose2
            dwell_sec: 0.0
            suction_action: 0
            suction_when: after_reach
          2:
            pose: pose3
            dwell_sec: 0.0
            suction_action: 0
            suction_when: after_reach
          3:
            pose: pose4
            dwell_sec: 0.0
            suction_action: 0
            suction_when: after_reach

      place_down:
        step_count: 3
        steps:
          0:
            pose: pose_init
            dwell_sec: 0.0
            suction_action: 0
            suction_when: after_reach
          1:
            pose: pose_read_kfs_below
            dwell_sec: 0.5
            suction_action: 2
            suction_when: after_dwell
          2:
            pose: pose_init
            dwell_sec: 0.0
            suction_action: 0
            suction_when: after_reach

      place_up:
        step_count: 3
        steps:
          0:
            pose: pose_init
            dwell_sec: 0.0
            suction_action: 0
            suction_when: after_reach
          1:
            pose: pose_read_kfs_above
            dwell_sec: 0.5
            suction_action: 2
            suction_when: after_dwell
          2:
            pose: pose_init
            dwell_sec: 0.0
            suction_action: 0
            suction_when: after_reach

      pick_40_up:
        step_count: 4
        steps:
          0:
            pose: pose_init
            dwell_sec: 0.0
            suction_action: 0
            suction_when: after_reach
          1:
            pose: pose_read_kfs_above
            dwell_sec: 0.5
            suction_action: 1
            suction_when: after_reach
          2:
            pose: pose_init
            dwell_sec: 0.0
            suction_action: 0
            suction_when: after_reach
          3:
            pose: pose1
            dwell_sec: 0.0
            suction_action: 2
            suction_when: after_reach

    diagnostics:        
      warn_throttle_ms: 1000

    actions:
      pose_arm_name: "r2/motion/pose_arm"
      handle_kfs_name: "r2/motion/place_kfs"

    suction:
      enabled: true
      service_name: "/set_suction"
      call_timeout_sec: 1.0
      fail_on_error: false

    poses:
      names:
        - manual
        - show_low
        - show_high
        - pose_init
        - pose_read_kfs_below
        - pose_read_kfs_above
        - pose_read_aruco_forward
        - pose_climb_r1
        - pose_weight_forward
        - pose_level2
        - pose_level3
        - pose1
        - pose2
        - pose3
        - pose4
        - pose5
        - pose6
        - pose7

